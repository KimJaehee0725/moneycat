name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/moneycat?schema=public
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-123456
      AUTH_COOKIE_NAME: moneycat_session
      APP_TIMEZONE: Asia/Seoul
      APP_CURRENCY: KRW
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma Generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
